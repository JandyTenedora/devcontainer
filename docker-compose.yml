services:
  claude:
    build:
      context: .
      args:
        USER_UID: ${DOCKER_UID:-1000}
    volumes:
      - ..:/workspace
      - ${HOME}/.claude:/home/node/.claude
      - ${HOME}/.claude.json:/home/node/.claude.json
      - ${HOME}/.claude_oauth:/home/node/.claude_oauth
      - ${HOME}/.gitconfig:/home/node/.gitconfig:ro
    environment:
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      GIT_TOKEN: ${GIT_TOKEN:-}
      GIT_ASKPASS: /usr/local/bin/askpass
    working_dir: /workspace
    stdin_open: true
    tty: true
